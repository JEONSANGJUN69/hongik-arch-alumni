<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홍익건축 총동문회 회원 주소록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #111111;
    --red: #D10000;
    --white: #ffffff;
    --gray: #f4f4f4;
    --gray2: #e0e0e0;
    --muted: #888;
    --text: #1a1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--gray); color: var(--text); min-height: 100vh; }

  header { background: var(--black); padding: 0 40px; display: flex; align-items: center; height: 80px; gap: 20px; box-shadow: 0 2px 16px rgba(0,0,0,0.3); position: sticky; top: 0; z-index: 100; }
  .logo-svg { width: 52px; height: 52px; flex-shrink: 0; }
  .header-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.2); }
  .header-title { flex: 1; }
  .header-title h1 { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; color: var(--white); letter-spacing: 2px; }
  .header-title p { font-size: 11px; color: rgba(255,255,255,0.45); letter-spacing: 1px; margin-top: 2px; }
  .header-count { background: var(--red); color: white; font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 20px; }

  .toolbar { background: var(--white); padding: 16px 40px; display: flex; gap: 12px; align-items: center; border-bottom: 2px solid var(--red); flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input { width: 100%; padding: 10px 16px 10px 40px; border: 1.5px solid var(--gray2); border-radius: 8px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color 0.2s; background: var(--gray); }
  .search-wrap input:focus { border-color: var(--red); background: white; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; }
  .btn-register { background: var(--red); color: white; border: none; padding: 10px 22px; border-radius: 8px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .btn-register:hover { background: #b80000; }
  .btn-refresh { background: var(--black); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .btn-refresh:hover { background: #333; }
  .btn-excel { background: #1d6f42; color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .btn-excel:hover { background: #155233; }

  .stats { display: flex; background: var(--white); border-bottom: 1px solid var(--gray2); padding: 0 40px; overflow-x: auto; }
  .stat-item { padding: 14px 28px; text-align: center; border-right: 1px solid var(--gray2); min-width: 100px; }
  .stat-item:last-child { border-right: none; }
  .stat-num { font-size: 24px; font-weight: 900; color: var(--black); line-height: 1; }
  .stat-num.red { color: var(--red); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 0.5px; }

  .table-wrap { margin: 24px 40px; background: var(--white); border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead tr { background: var(--black); color: white; }
  thead th { padding: 14px 18px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 1px; white-space: nowrap; }
  thead th:first-child { border-left: 3px solid var(--red); }
  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
  tbody tr:hover { background: #fff5f5; }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 13px 18px; vertical-align: middle; }
  td:first-child { font-weight: 700; color: var(--black); }
  .major-badge { display: inline-block; background: var(--black); color: white; font-size: 11px; padding: 3px 10px; border-radius: 4px; }
  .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { font-size: 15px; line-height: 1.8; }
  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 15px; }
  .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--gray2); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
  .overlay.active { display: flex; }
  .modal { background: white; border-radius: 16px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,0.3); }
  .modal-header { background: var(--black); color: white; padding: 22px 28px; display: flex; align-items: center; justify-content: space-between; border-radius: 16px 16px 0 0; border-left: 4px solid var(--red); }
  .modal-header h2 { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
  .btn-close { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 22px; cursor: pointer; }
  .btn-close:hover { color: white; }
  .modal-body { padding: 28px; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 7px; }
  .form-group label .req { color: var(--red); margin-left: 2px; }
  .form-group input, .form-group select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--gray2); border-radius: 8px; font-size: 14px; font-family: 'Noto Sans KR', sans-serif; color: var(--text); background: var(--gray); outline: none; transition: border-color 0.2s; }
  .form-group input:focus, .form-group select:focus { border-color: var(--red); background: white; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .btn-submit { width: 100%; padding: 14px; background: var(--red); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: background 0.2s; letter-spacing: 1px; margin-top: 4px; }
  .btn-submit:hover { background: #b80000; }
  .btn-submit:disabled { background: var(--muted); cursor: not-allowed; }

  .toast { position: fixed; bottom: 32px; right: 32px; background: var(--black); color: white; padding: 14px 22px; border-radius: 10px; font-size: 14px; border-left: 4px solid var(--red); box-shadow: 0 8px 24px rgba(0,0,0,0.2); transform: translateY(80px); opacity: 0; transition: all 0.3s ease; z-index: 300; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 768px) {
    header { padding: 0 16px; height: 64px; }
    .header-title h1 { font-size: 14px; }
    .toolbar { padding: 12px 16px; }
    .stats { padding: 0 16px; }
    .stat-item { padding: 12px 14px; min-width: 80px; }
    .table-wrap { margin: 16px; }
    thead th, td { padding: 10px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect x="25" y="2" width="73" height="58" fill="#111111"/>
    <polygon points="25,2 25,60 80,60" fill="#D10000" stroke="white" stroke-width="1.5"/>
    <rect x="25" y="62" width="73" height="36" fill="#111111"/>
    <path d="M25,98 Q80,62 98,62" fill="none" stroke="white" stroke-width="2"/>
    <rect x="2" y="2" width="18" height="96" fill="white"/>
  </svg>
  <div class="header-divider"></div>
  <div class="header-title">
    <h1>홍익건축 총동문회</h1>
    <p>HONGIK ARCHITECTURE ALUMNI DIRECTORY</p>
  </div>
  <div class="header-count" id="headerCount">불러오는 중...</div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="이름, 학번, 전공, 직장 검색..." oninput="render()">
  </div>
  <button class="btn-register" onclick="openModal()">＋ 회원 등록</button>
  <button class="btn-refresh" onclick="loadMembers()">🔄 새로고침</button>
  <button class="btn-excel" onclick="exportCSV()">📥 CSV 저장</button>
</div>

<div class="stats">
  <div class="stat-item"><div class="stat-num red" id="statTotal">-</div><div class="stat-label">전체 회원</div></div>
  <div class="stat-item"><div class="stat-num" id="statArch">-</div><div class="stat-label">건축학과</div></div>
  <div class="stat-item"><div class="stat-num" id="statEng">-</div><div class="stat-label">건축공학과</div></div>
  <div class="stat-item"><div class="stat-num" id="statOther">-</div><div class="stat-label">기타전공</div></div>
</div>

<div class="table-wrap">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <p>명부를 불러오는 중입니다...</p>
  </div>
  <table id="mainTable" style="display:none">
    <thead>
      <tr>
        <th>#</th>
        <th>이름 ★</th>
        <th>전공 ★</th>
        <th>학번 ★</th>
        <th>전화번호 ★</th>
        <th>직장 / 직함</th>
        <th>출생년도</th>
        <th>등록일시</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">🏛️</div>
    <p><strong>등록된 동문이 없습니다</strong><br>상단 <strong style="color:var(--red)">＋ 회원 등록</strong> 버튼을 눌러<br>첫 번째 동문을 등록해 주세요!</p>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <h2>✏️ 회원 등록</h2>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>이름 <span class="req">★ 필수</span></label>
          <input type="text" id="f_name" placeholder="홍길동">
        </div>
        <div class="form-group">
          <label>학번 <span class="req">★ 필수</span></label>
          <input type="text" id="f_sno" placeholder="예: 85">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>전공 <span class="req">★ 필수</span></label>
          <select id="f_major">
            <option value="">-- 선택 --</option>
            <option value="건축학과">건축학과</option>
            <option value="건축공학과">건축공학과</option>
            <option value="실내건축학과">실내건축학과</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label>전화번호 <span class="req">★ 필수</span></label>
          <input type="tel" id="f_phone" placeholder="010-0000-0000">
        </div>
      </div>
      <div class="form-group">
        <label>직장 / 직함</label>
        <input type="text" id="f_company" placeholder="예: (주)홍익건축 대표이사">
      </div>
      <div class="form-group">
        <label>출생년도</label>
        <input type="text" id="f_birth" placeholder="예: 1965">
      </div>
      <button class="btn-submit" id="submitBtn" onclick="addMember()">등 록 하 기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbwz8LApU-ZurcTkkdIgRoBPttzZZ4SGRDswJ4PgJAiP73LGGiqJd3gFFxCqSwh1g5pZRQ/exec';
  let members = [];

  // ── 데이터 불러오기
  async function loadMembers() {
    document.getElementById('loadingState').style.display = 'block';
    document.getElementById('mainTable').style.display = 'none';
    document.getElementById('emptyState').style.display = 'none';
    try {
      const res = await fetch(API);
      const data = await res.json();
      members = data.members || [];
      render();
    } catch(err) {
      showToast('⚠️ 데이터를 불러오지 못했습니다. 새로고침 해주세요.');
      document.getElementById('loadingState').style.display = 'none';
    }
  }

  // ── 화면 렌더링
  function render() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = members.filter(m =>
      ['이름','전공','학번','전화번호','직장/직함'].some(k => (m[k]||'').toLowerCase().includes(q))
    );

    document.getElementById('statTotal').textContent = members.length;
    document.getElementById('statArch').textContent = members.filter(m => m['전공'] === '건축학과').length;
    document.getElementById('statEng').textContent = members.filter(m => m['전공'] === '건축공학과').length;
    document.getElementById('statOther').textContent = members.filter(m => !['건축학과','건축공학과'].includes(m['전공'])).length;
    document.getElementById('headerCount').textContent = '전체 ' + members.length + '명';

    document.getElementById('loadingState').style.display = 'none';

    if (filtered.length === 0) {
      document.getElementById('mainTable').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
    } else {
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('mainTable').style.display = 'table';
      document.getElementById('tableBody').innerHTML = filtered.map((m, i) => `
        <tr>
          <td style="color:var(--muted);font-size:12px">${i+1}</td>
          <td>${m['이름']||''}</td>
          <td><span class="major-badge">${m['전공']||''}</span></td>
          <td style="color:var(--muted)">${m['학번']||''}</td>
          <td>${m['전화번호']||''}</td>
          <td style="color:#444">${m['직장/직함'] || '<span style="color:#ccc">—</span>'}</td>
          <td style="color:var(--muted)">${m['출생년도'] || '<span style="color:#ccc">—</span>'}</td>
          <td style="color:var(--muted);font-size:12px">${m['등록일시']||''}</td>
        </tr>`).join('');
    }
  }

  // ── 회원 등록
  async function addMember() {
    const name    = document.getElementById('f_name').value.trim();
    const sno     = document.getElementById('f_sno').value.trim();
    const major   = document.getElementById('f_major').value;
    const phone   = document.getElementById('f_phone').value.trim();
    const company = document.getElementById('f_company').value.trim();
    const birth   = document.getElementById('f_birth').value.trim();

    if (!name || !sno || !major || !phone) {
      showToast('⚠️ 이름, 학번, 전공, 전화번호는 필수입니다!');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '등록 중...';

    try {
      await fetch(API, {
        method: 'POST',
        body: JSON.stringify({ name, sno, major, phone, company, birth }),
      });
      closeModal();
      showToast('✅ ' + name + ' 동문이 등록되었습니다!');
      await loadMembers();
    } catch(err) {
      showToast('⚠️ 등록 중 오류가 발생했습니다.');
    } finally {
      btn.disabled = false;
      btn.textContent = '등 록 하 기';
    }
  }

  // ── CSV 내보내기
  function exportCSV() {
    if (members.length === 0) { showToast('⚠️ 내보낼 데이터가 없습니다.'); return; }
    const headers = ['이름','전공','학번','전화번호','직장/직함','출생년도','등록일시'];
    const rows = members.map(m => headers.map(h => m[h]||''));
    const csv = '\uFEFF' + [headers, ...rows].map(r => r.map(v => '"'+v+'"').join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    a.download = '홍익건축총동문회_주소록.csv';
    a.click();
    showToast('📥 CSV 파일이 저장되었습니다!');
  }

  function openModal() { document.getElementById('overlay').classList.add('active'); document.getElementById('f_name').focus(); }
  function closeModal() {
    document.getElementById('overlay').classList.remove('active');
    ['f_name','f_sno','f_phone','f_company','f_birth'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f_major').value = '';
  }
  function closeModalOutside(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // 전화번호 자동 하이픈
  document.getElementById('f_phone').addEventListener('input', function() {
    let v = this.value.replace(/\D/g,'');
    if (v.length <= 3) this.value = v;
    else if (v.length <= 7) this.value = v.slice(0,3)+'-'+v.slice(3);
    else this.value = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7,11);
  });

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // 시작 시 데이터 로드
  loadMembers();
</script>
</body>
</html>
